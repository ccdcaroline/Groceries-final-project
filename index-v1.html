<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grocery List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 420px;
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #333;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 10px 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #addBtn {
      background: #2d89ef;
      color: white;
    }

    #addBtn:hover {
      background: #1f6fc8;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      background: #f8f9fb;
      border: 1px solid #e2e6ea;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .remove-btn {
      background: #e74c3c;
      color: white;
      padding: 6px 10px;
      font-size: 14px;
    }

    .remove-btn:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Grocery List</h1>
    <div class="input-row">
      <input id="itemInput" type="text" placeholder="Enter grocery item..." />
      <button id="addBtn">Add</button>
    </div>
    <ul id="groceryList"></ul>
  </div>

  <script>
    const itemInput = document.getElementById("itemInput");
    const addBtn = document.getElementById("addBtn");
    const groceryList = document.getElementById("groceryList");

    function addItem() {
      const itemText = itemInput.value.trim();
      if (itemText === "") return;

      const li = document.createElement("li");
      li.innerHTML = `
        <span>${itemText}</span>
        <button class="remove-btn">Remove</button>
      `;

      li.querySelector(".remove-btn").addEventListener("click", () => {
        li.remove();
      });

      groceryList.appendChild(li);
      itemInput.value = "";
      itemInput.focus();
    }

    addBtn.addEventListener("click", addItem);

    itemInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addItem();
    });
  </script>
</body>
</html>
