<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Lists | Smart Grocery Planner</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script type="module" src="javascript/app.js"></script>
</head>
<body data-page="pantry">
  <header class="site-header">
    <div class="container nav-wrap">
      <h1>Smart Grocery Planner</h1>
      <nav>
        <a href="index.html" data-nav="home">Home</a>
        <a href="pantry.html" data-nav="pantry">My Lists</a>
        <a href="meal-ideas.html" data-nav="meals">AI Meal Ideas</a>
      </nav>
    </div>
  </header>
 
  <main class="container">
    <section class="grid-two">
      <article class="card">
        <div class="title-row">
          <h2>Pantry / Just Bought</h2>
          <span class="pill" id="pantryCount">0</span>
        </div>
 
        <div class="input-row">
          <input id="pantryInput" type="text" placeholder="Add pantry item..." />
          <button id="addPantryBtn" class="btn">Add</button>
        </div>
 
        <ul id="pantryList" class="item-list"></ul>
        <button id="clearPantryBtn" class="btn btn-danger">Clear Pantry</button>
      </article>
 
      <article class="card">
        <div class="title-row">
          <h2>Need to Buy</h2>
          <span class="pill" id="needCount">0</span>
        </div>
 
        <div class="input-row">
          <input id="needInput" type="text" placeholder="Add item to buy..." />
          <button id="addNeedBtn" class="btn">Add</button>
        </div>
 
        <ul id="needList" class="item-list"></ul>
        <button id="clearNeedBtn" class="btn btn-danger">Clear Need List</button>
      </article>
    </section>
  </main>
</body>
</html>
